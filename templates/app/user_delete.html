{% extends 'app/base.html' %}

{% block content %}

<div class="card p-4 text-center">
    <h4>Delete {{ user.name }}?</h4>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Yes</button>
        <a href="{% url 'users_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
