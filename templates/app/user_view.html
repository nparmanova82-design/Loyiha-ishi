{% extends 'app/base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-image">
            {% if user.picture %}
                <img src="{{ user.picture.url }}" alt="">
            {% else %}
                <img src="{% static 'default.png' %}" alt="">
            {% endif %}
        </div>

        <div class="profile-info">
            <h2>{{ user.ism }} {{ user.familiya }}</h2>
            <p><strong>Yosh:</strong> {{ user.yosh }}</p>
        </div>

        <div class="profile-actions">
            <a href="{% url 'users_list' %}" class="btn back">⬅ Orqaga</a>
            <a href="{% url 'user_update' user.slug %}" class="btn edit">✏️ Edit</a>
            <a href="{% url 'user_delete' user.id %}" class="btn delete">🗑 Delete</a>
        </div>

    </div>

</div>

{% endblock %}
